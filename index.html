<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="synth">
    <h1>Synth</h1>

    <div class="controls">
      <label>
        Waveform
        <select id="waveform">
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="triangle">Triangle</option>
        </select>
      </label>

      <label>
        Volume
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5" />
      </label>

      <div class="divider"></div>

      <label>
        LFO Rate
        <input type="range" id="lfo-rate" min="0.1" max="20" step="0.1" value="4" />
        <span id="lfo-rate-display">4.0 Hz</span>
      </label>

      <label>
        LFO Depth
        <input type="range" id="lfo-depth" min="0" max="50" step="1" value="0" />
        <span id="lfo-depth-display">0</span>
      </label>

      <label>
        LFO Target
        <select id="lfo-target">
          <option value="pitch">Pitch (vibrato)</option>
          <option value="amp">Amplitude (tremolo)</option>
        </select>
      </label>
    </div>

    <div class="keyboard" id="keyboard"></div>

    <div class="hint">Click keys or use keyboard: A S D F G H J K L ; (white) &nbsp; W E T Y U O P (black)</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
